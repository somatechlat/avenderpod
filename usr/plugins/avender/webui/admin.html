<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡A VENDER! - Panel de Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script type="module">
        import { TenantDashboardBase } from './admin_base.js';
        import { AdminDashboardMixin } from './admin_dashboard.js';
        import { AdminInboxMixin } from './admin_inbox.js';
        import { AdminCatalogMixin } from './admin_catalog.js';
        import { AdminSettingsMixin } from './admin_settings.js';

        // Compose final class from mixins
        class TenantDashboard extends AdminSettingsMixin(
            AdminCatalogMixin(
                AdminInboxMixin(
                    AdminDashboardMixin(TenantDashboardBase)
                )
            )
        ) {}

        customElements.define('tenant-dashboard', TenantDashboard);
    </script>
</head>
<body class="m-0 p-0">
    <tenant-dashboard></tenant-dashboard>
</body>
</html>
