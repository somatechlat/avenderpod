<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡A VENDER! - Panel de Administración</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Hide scrollbar for clean chat view */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script type="module">
        import { LitElement, html, css } from 'https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js';

        class TenantDashboard extends LitElement {
            static properties = {
                authenticated: { type: Boolean },
                loginPassword: { type: String },
                loginError: { type: String },
                activeTab: { type: String },
                conversations: { type: Array },
                catalog: { type: Array },
                settings: { type: Object },
                kpis: { type: Object },
                activeContextId: { type: String },
                activeMessages: { type: Array },
                loading: { type: Boolean }
            };

            constructor() {
                super();
                this.authenticated = false;
                this.loginPassword = '';
                this.loginError = '';
                this.authToken = localStorage.getItem('avender_admin_token') || '';
                this.activeTab = 'inbox';
                this.conversations = [];
                this.catalog = [];
                this.settings = {};
                this.kpis = { orders_today: 0, total_interactions: 0, active_sessions: 0 };
                this.activeContextId = null;
                this.activeMessages = [];
                this.loading = false;
            }

            createRenderRoot() {
                return this; // Disable shadow DOM for Tailwind CSS compatibility
            }

            async connectedCallback() {
                super.connectedCallback();
                // Verify existing session
                if (this.authToken) {
                    const valid = await this._verifySession();
                    if (valid) {
                        this.authenticated = true;
                        this._startPolling();
                    } else {
                        localStorage.removeItem('avender_admin_token');
                        this.authToken = '';
                    }
                }
            }

            disconnectedCallback() {
                super.disconnectedCallback();
                clearInterval(this.pollInterval);
            }

            apiHeaders() {
                return {
                    'Content-Type': 'application/json',
                    'X-Avender-Admin-Token': this.authToken || ''
                };
            }

            async _verifySession() {
                try {
                    const res = await fetch('/api/plugins/avender/auth_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'verify', token: this.authToken })
                    });
                    const data = await res.json();
                    return data.ok === true;
                } catch { return false; }
            }

            async handleLogin() {
                this.loginError = '';
                try {
                    const res = await fetch('/api/plugins/avender/auth_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'login', password: this.loginPassword })
                    });
                    const data = await res.json();
                    if (data.ok) {
                        this.authToken = data.token;
                        localStorage.setItem('avender_admin_token', data.token);
                        this.authenticated = true;
                        this.loginPassword = '';
                        this.loadAllData();
                        this._startPolling();
                    } else {
                        this.loginError = data.error || 'Error de autenticación.';
                    }
                } catch (e) {
                    this.loginError = 'Error de conexión al servidor.';
                }
            }

            async handleLogout() {
                await fetch('/api/plugins/avender/auth_api', {
                    method: 'POST',
                    headers: this.apiHeaders(),
                    body: JSON.stringify({ action: 'logout', token: this.authToken })
                }).catch(() => {});
                localStorage.removeItem('avender_admin_token');
                this.authToken = '';
                this.authenticated = false;
                clearInterval(this.pollInterval);
            }

            _startPolling() {
                this.loadAllData();
                this.pollInterval = setInterval(() => {
                    if (this.activeTab === 'inbox') this.loadConversations();
                    if (this.activeContextId) this.loadMessages(this.activeContextId);
                }, 3000);
            }

            async loadAllData() {
                await Promise.all([
                    this.loadConversations(),
                    this.loadCatalog(),
                    this.loadKpis(),
                    this.loadSettings()
                ]);
            }

            async loadConversations() {
                try {
                    const res = await fetch('/api/plugins/avender/admin_conversations_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'list' })
                    });
                    const data = await res.json();
                    if (data.ok) this.conversations = data.conversations;
                } catch (e) { console.error("Error loading conversations", e); }
            }

            async loadMessages(contextId) {
                try {
                    const res = await fetch('/api/plugins/avender/admin_conversations_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'messages', context_id: contextId })
                    });
                    const data = await res.json();
                    if (data.ok) this.activeMessages = data.messages;
                } catch (e) { console.error("Error loading messages", e); }
            }

            async loadCatalog() {
                try {
                    const res = await fetch('/api/plugins/avender/admin_catalog_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'list' })
                    });
                    const data = await res.json();
                    if (data.ok) this.catalog = data.items;
                } catch (e) { console.error("Error loading catalog", e); }
            }

            async loadKpis() {
                try {
                    const res = await fetch('/api/plugins/avender/admin_interactions_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'kpis' })
                    });
                    const data = await res.json();
                    if (data.ok) this.kpis = data.kpis;
                } catch (e) { console.error("Error loading kpis", e); }
            }

            async loadSettings() {
                try {
                    const res = await fetch('/api/plugins/avender/admin_settings_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'get' })
                    });
                    const data = await res.json();
                    if (data.ok) this.settings = data.settings;
                } catch (e) { console.error("Error loading settings", e); }
            }

            async saveSettings() {
                try {
                    const res = await fetch('/api/plugins/avender/admin_settings_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'save', settings: this.settings })
                    });
                    const data = await res.json();
                    if (!data.ok) console.error("Error saving settings", data.error);
                    await this.loadSettings();
                } catch (e) { console.error("Error saving settings", e); }
            }

            async handleTakeover() {
                if (!this.activeContextId) return;
                try {
                    await fetch('/api/plugins/avender/admin_conversations_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'takeover', context_id: this.activeContextId })
                    });
                    this.loadConversations();
                } catch (e) { console.error("Error on takeover", e); }
            }

            async handleRelease() {
                if (!this.activeContextId) return;
                try {
                    await fetch('/api/plugins/avender/admin_conversations_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'release', context_id: this.activeContextId })
                    });
                    this.loadConversations();
                } catch (e) { console.error("Error on release", e); }
            }

            async sendManualMessage(e) {
                e.preventDefault();
                const input = e.target.querySelector('input');
                const message = input.value;
                if (!message || !this.activeContextId) return;
                
                try {
                    input.value = '';
                    await fetch('/api/plugins/avender/admin_conversations_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'send', context_id: this.activeContextId, message })
                    });
                    this.loadMessages(this.activeContextId);
                } catch (e) { console.error("Error sending message", e); }
            }

            selectConversation(contextId) {
                this.activeContextId = contextId;
                this.loadMessages(contextId);
            }

            render() {
                if (!this.authenticated) {
                    return html`
                        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-indigo-950 to-gray-900">
                            <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-10 w-full max-w-md shadow-2xl border border-white/10">
                                <h1 class="text-3xl font-extrabold text-white text-center mb-2">¡A VENDER!</h1>
                                <p class="text-gray-400 text-center mb-8">Panel de Administración</p>
                                ${this.loginError ? html`
                                    <div class="bg-red-500/20 border border-red-500/40 rounded-lg px-4 py-3 mb-4 text-red-200 text-sm text-center">${this.loginError}</div>
                                ` : ''}
                                <input type="password" 
                                    .value=${this.loginPassword}
                                    @input=${(e) => this.loginPassword = e.target.value}
                                    @keyup=${(e) => e.key === 'Enter' && this.handleLogin()}
                                    placeholder="Contraseña de Administrador"
                                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4"
                                >
                                <button @click=${this.handleLogin} class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg hover:shadow-indigo-500/30">
                                    Iniciar Sesión
                                </button>
                            </div>
                        </div>
                    `;
                }

                return html`
                    <div class="h-screen flex bg-gray-50 overflow-hidden">
                        <!-- Sidebar -->
                        <aside class="w-64 bg-gray-900 text-white flex flex-col flex-shrink-0">
                            <div class="p-6 border-b border-gray-800">
                                <h1 class="text-2xl font-extrabold tracking-tight">¡A VENDER!</h1>
                                <p class="text-xs text-gray-400 mt-1 truncate">${this.settings.trade_name || 'Panel de Negocio'}</p>
                            </div>
                            <nav class="flex-1 p-4 space-y-2">
                                ${this.renderNavItem('dashboard', '📊 Resumen')}
                                ${this.renderNavItem('inbox', '💬 Inbox en Vivo')}
                                ${this.renderNavItem('catalog', '📦 Catálogo')}
                                ${this.renderNavItem('settings', '⚙️ Ajustes')}
                            </nav>
                            <div class="p-4 border-t border-gray-800">
                                <button @click=${this.handleLogout} class="w-full px-4 py-2 rounded-lg text-gray-300 hover:bg-red-600/20 hover:text-red-300 transition text-sm flex items-center gap-2">
                                    🚪 Cerrar Sesión
                                </button>
                            </div>
                        </aside>

                        <!-- Main Content -->
                        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
                            ${this.activeTab === 'dashboard' ? this.renderDashboard() : ''}
                            ${this.activeTab === 'inbox' ? this.renderInbox() : ''}
                            ${this.activeTab === 'catalog' ? this.renderCatalog() : ''}
                            ${this.activeTab === 'settings' ? this.renderSettings() : ''}
                        </main>
                    </div>
                `;
            }


            renderNavItem(id, label) {
                const isActive = this.activeTab === id;
                const classes = isActive 
                    ? 'block px-4 py-3 rounded-lg bg-indigo-600 text-white font-medium shadow-md transition-colors'
                    : 'block px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors cursor-pointer';
                return html`<a @click=${() => this.activeTab = id} class="${classes}">${label}</a>`;
            }

            renderDashboard() {
                return html`
                    <div class="p-8 overflow-y-auto h-full">
                        <h2 class="text-3xl font-bold text-gray-900 mb-6">Hola, bienvenido a tu negocio 🚀</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 class="text-gray-500 text-sm font-medium">Pedidos/Interacciones de Hoy</h3>
                                <p class="text-3xl font-bold text-gray-900 mt-2">${this.kpis.orders_today}</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 class="text-gray-500 text-sm font-medium">Chats Activos</h3>
                                <p class="text-3xl font-bold text-gray-900 mt-2">${this.kpis.active_sessions}</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 class="text-gray-500 text-sm font-medium">Estado del Agente</h3>
                                <p class="text-xl font-bold text-green-600 mt-2 flex items-center">
                                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                                    Atendiendo
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderInbox() {
                const activeConv = this.conversations.find(c => c.context_id === this.activeContextId);
                
                return html`
                    <div class="flex h-full">
                        <!-- Conversations List -->
                        <div class="w-1/3 border-r border-gray-200 bg-white flex flex-col flex-shrink-0">
                            <div class="p-4 border-b border-gray-200 bg-gray-50">
                                <h2 class="font-bold text-gray-800">Chats en Vivo</h2>
                            </div>
                            <div class="flex-1 overflow-y-auto no-scrollbar divide-y divide-gray-100">
                                ${this.conversations.length === 0 ? html`<div class="p-6 text-center text-gray-500">No hay chats activos.</div>` : ''}
                                ${this.conversations.map(c => html`
                                    <div @click=${() => this.selectConversation(c.context_id)} 
                                         class="p-4 cursor-pointer hover:bg-gray-50 transition ${this.activeContextId === c.context_id ? 'bg-indigo-50 border-l-4 border-indigo-600' : ''}">
                                        <div class="flex justify-between items-start mb-1">
                                            <span class="font-semibold text-gray-900">${c.sender_name || c.sender_number}</span>
                                            ${c.status === 'handoff' 
                                                ? html`<span class="px-2 py-0.5 bg-red-100 text-red-700 text-xs font-bold rounded">ESPERANDO HUMANO</span>`
                                                : html`<span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs font-bold rounded">IA ACTIVO</span>`
                                            }
                                        </div>
                                        <p class="text-sm text-gray-500 truncate">${c.last_message}</p>
                                    </div>
                                `)}
                            </div>
                        </div>

                        <!-- Chat Detail -->
                        <div class="flex-1 flex flex-col bg-gray-50 min-w-0">
                            ${activeConv ? html`
                                <!-- Header -->
                                <div class="p-4 bg-white border-b border-gray-200 flex justify-between items-center shadow-sm z-10">
                                    <div>
                                        <h3 class="font-bold text-gray-900 text-lg">${activeConv.sender_name || activeConv.sender_number}</h3>
                                        <p class="text-xs text-gray-500">${activeConv.sender_number}</p>
                                    </div>
                                    <div>
                                        ${activeConv.status === 'ai_active' ? html`
                                            <button @click=${this.handleTakeover} class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-black transition">
                                                Tomar Control Manual
                                            </button>
                                        ` : html`
                                            <button @click=${this.handleRelease} class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-indigo-700 transition">
                                                Devolver a IA
                                            </button>
                                        `}
                                    </div>
                                </div>
                                
                                <!-- Messages -->
                                <div class="flex-1 overflow-y-auto p-6 space-y-4">
                                    ${this.activeMessages.map(m => html`
                                        <div class="flex ${m.role === 'customer' ? 'justify-start' : 'justify-end'}">
                                            <div class="max-w-[70%] rounded-2xl px-5 py-3 shadow-sm ${
                                                m.role === 'customer' 
                                                ? 'bg-white border border-gray-100 text-gray-800' 
                                                : (activeConv.status === 'handoff' ? 'bg-yellow-100 text-yellow-900' : 'bg-indigo-600 text-white')
                                            }">
                                                <div class="text-xs font-bold mb-1 opacity-75">
                                                    ${m.role === 'customer' ? 'Cliente' : (activeConv.status === 'handoff' ? 'Humano' : 'IA')}
                                                </div>
                                                <div class="text-[15px] whitespace-pre-wrap">${m.content}</div>
                                            </div>
                                        </div>
                                    `)}
                                </div>

                                <!-- Input Box (Only visible during Takeover) -->
                                ${activeConv.status === 'handoff' ? html`
                                    <div class="p-4 bg-white border-t border-gray-200">
                                        <form @submit=${this.sendManualMessage} class="flex gap-2">
                                            <input type="text" placeholder="Escribe un mensaje..." class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700">Enviar</button>
                                        </form>
                                    </div>
                                ` : html`
                                    <div class="p-3 bg-gray-100 border-t border-gray-200 text-center text-xs text-gray-500 font-medium">
                                        La IA está respondiendo automáticamente. Toma el control para enviar mensajes manuales.
                                    </div>
                                `}
                            ` : html`
                                <div class="flex-1 flex items-center justify-center text-gray-400 font-medium">
                                    Selecciona un chat para ver los mensajes.
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }

            openCatalogModal(item = null) {
                this.catalogEditItem = item ? { ...item } : { id: null, name: '', description: '', price: 0.0, metadata: {} };
                this.showCatalogModal = true;
            }

            async saveCatalogItem() {
                const item = this.catalogEditItem;
                if (!item.name || item.price === '') {
                    alert('Nombre y precio son obligatorios.');
                    return;
                }
                const action = item.id ? 'update' : 'create';
                try {
                    const res = await fetch('/api/plugins/avender/admin_catalog_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action, item })
                    });
                    const data = await res.json();
                    if (data.ok) {
                        this.showCatalogModal = false;
                        this.loadCatalog();
                    } else {
                        alert(data.error || 'Error guardando producto.');
                    }
                } catch (e) { console.error("Error saving catalog item", e); }
            }

            async deleteCatalogItem(itemId) {
                if (!confirm('¿Estás seguro de eliminar este producto?')) return;
                try {
                    const res = await fetch('/api/plugins/avender/admin_catalog_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'delete', id: itemId })
                    });
                    const data = await res.json();
                    if (data.ok) this.loadCatalog();
                } catch (e) { console.error("Error deleting catalog item", e); }
            }

            renderCatalog() {
                return html`
                    <div class="p-8 overflow-y-auto h-full">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-3xl font-bold text-gray-900">Catálogo y Precios</h2>
                                <p class="text-gray-600">Actualiza los productos que el asistente vende.</p>
                            </div>
                            <button @click=${() => this.openCatalogModal()} class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 shadow-sm">+ Nuevo Producto</button>
                        </div>
                        
                        ${this.showCatalogModal ? html`
                            <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                                <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg mx-4">
                                    <h3 class="text-xl font-bold mb-4">${this.catalogEditItem.id ? 'Editar Producto' : 'Nuevo Producto'}</h3>
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-bold text-gray-700 mb-1">Nombre</label>
                                            <input type="text" .value=${this.catalogEditItem.name} @input=${e => this.catalogEditItem = {...this.catalogEditItem, name: e.target.value}} class="w-full border-gray-300 rounded-lg p-3 border">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-bold text-gray-700 mb-1">Descripción</label>
                                            <input type="text" .value=${this.catalogEditItem.description || ''} @input=${e => this.catalogEditItem = {...this.catalogEditItem, description: e.target.value}} class="w-full border-gray-300 rounded-lg p-3 border">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-bold text-gray-700 mb-1">Precio</label>
                                            <input type="number" step="0.01" .value=${this.catalogEditItem.price} @input=${e => this.catalogEditItem = {...this.catalogEditItem, price: parseFloat(e.target.value) || 0}} class="w-full border-gray-300 rounded-lg p-3 border">
                                        </div>
                                    </div>
                                    <div class="flex justify-end gap-3 mt-6">
                                        <button @click=${() => this.showCatalogModal = false} class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 font-medium">Cancelar</button>
                                        <button @click=${this.saveCatalogItem} class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700">Guardar</button>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th class="p-4 font-semibold text-gray-700">Nombre</th>
                                        <th class="p-4 font-semibold text-gray-700">Descripción</th>
                                        <th class="p-4 font-semibold text-gray-700">Precio</th>
                                        <th class="p-4 font-semibold text-gray-700 w-32">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${this.catalog.length === 0 ? html`<tr><td colspan="4" class="p-6 text-center text-gray-500">El catálogo está vacío.</td></tr>` : ''}
                                    ${this.catalog.map(item => html`
                                        <tr class="hover:bg-gray-50">
                                            <td class="p-4 font-medium text-gray-900">${item.name}</td>
                                            <td class="p-4 text-gray-500 text-sm">${item.description}</td>
                                            <td class="p-4 font-bold text-green-600">$${item.price}</td>
                                            <td class="p-4 flex gap-2">
                                                <button @click=${() => this.openCatalogModal(item)} class="text-indigo-600 font-medium text-sm hover:underline">Editar</button>
                                                <button @click=${() => this.deleteCatalogItem(item.id)} class="text-red-600 font-medium text-sm hover:underline">Eliminar</button>
                                            </td>
                                        </tr>
                                    `)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            async changeAdminPassword() {
                const current = this.passwordCurrent || '';
                const newPass = this.passwordNew || '';
                const confirm = this.passwordConfirm || '';
                if (!current || !newPass || !confirm) {
                    alert('Completa todos los campos de contraseña.');
                    return;
                }
                if (newPass.length < 8) {
                    alert('La nueva contraseña debe tener al menos 8 caracteres.');
                    return;
                }
                if (newPass !== confirm) {
                    alert('Las contraseñas nuevas no coinciden.');
                    return;
                }
                try {
                    const res = await fetch('/api/plugins/avender/auth_api', {
                        method: 'POST',
                        headers: this.apiHeaders(),
                        body: JSON.stringify({ action: 'change_password', current, new: newPass })
                    });
                    const data = await res.json();
                    if (data.ok) {
                        alert('Contraseña actualizada exitosamente.');
                        this.passwordCurrent = '';
                        this.passwordNew = '';
                        this.passwordConfirm = '';
                    } else {
                        alert(data.error || 'Error cambiando contraseña.');
                    }
                } catch (e) { console.error("Error changing password", e); }
            }

            renderSettings() {
                return html`
                    <div class="p-8 overflow-y-auto h-full max-w-3xl">
                        <h2 class="text-3xl font-bold text-gray-900 mb-2">Ajustes del Vendedor</h2>
                        <p class="text-gray-600 mb-8">Configura la personalidad y reglas de tu agente.</p>

                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 space-y-6">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre del Vendedor</label>
                                <input type="text"
                                    .value=${this.settings.agent_name || ''}
                                    @input=${(e) => this.settings = {...this.settings, agent_name: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Comercial</label>
                                <input type="text"
                                    .value=${this.settings.trade_name || ''}
                                    @input=${(e) => this.settings = {...this.settings, trade_name: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Número de WhatsApp</label>
                                <input type="text"
                                    .value=${this.settings.whatsapp_number || ''}
                                    @input=${(e) => this.settings = {...this.settings, whatsapp_number: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Horarios de Atención</label>
                                <textarea rows="3"
                                    .value=${this.settings.hours || ''}
                                    @input=${(e) => this.settings = {...this.settings, hours: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Zonas de Envío y Costos</label>
                                <textarea rows="3"
                                    .value=${this.settings.delivery_rules || ''}
                                    @input=${(e) => this.settings = {...this.settings, delivery_rules: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Políticas o Reglas Importantes</label>
                                <textarea rows="3"
                                    .value=${this.settings.policies || ''}
                                    @input=${(e) => this.settings = {...this.settings, policies: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Promociones Activas</label>
                                <textarea rows="2"
                                    .value=${this.settings.promotions || ''}
                                    @input=${(e) => this.settings = {...this.settings, promotions: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Tono del Asistente</label>
                                <select .value=${this.settings.tone || 'friendly'}
                                    @change=${(e) => this.settings = {...this.settings, tone: e.target.value}}
                                    class="w-full border-gray-300 rounded-lg p-3 border focus:ring-2 focus:ring-indigo-500">
                                    <option value="friendly">Amigable</option>
                                    <option value="formal">Formal</option>
                                </select>
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="checkbox" .checked=${this.settings.use_slang || false}
                                    @change=${(e) => this.settings = {...this.settings, use_slang: e.target.checked}}
                                    class="h-5 w-5 text-indigo-600 rounded border-gray-300">
                                <label class="text-sm font-bold text-gray-700">Hablar como Ecuatoriano 🇪🇨</label>
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="checkbox" .checked=${this.settings.emojis || false}
                                    @change=${(e) => this.settings = {...this.settings, emojis: e.target.checked}}
                                    class="h-5 w-5 text-indigo-600 rounded border-gray-300">
                                <label class="text-sm font-bold text-gray-700">Usar Emojis</label>
                            </div>

                            <div class="flex items-center gap-3">
                                <input type="checkbox" .checked=${this.settings.restrict_access || false}
                                    @change=${(e) => this.settings = {...this.settings, restrict_access: e.target.checked}}
                                    class="h-5 w-5 text-indigo-600 rounded border-gray-300">
                                <label class="text-sm font-bold text-gray-700">Lista Blanca de Clientes (Modo Privado)</label>
                            </div>
                            
                            <!-- Age Verification Lock Alert (For Liquor/CBD) -->
                            ${['liquor', 'cbd', 'licoreria', 'cannabis'].includes((this.settings.archetype || '').toLowerCase()) ? html`
                                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg mt-6">
                                    <div class="flex">
                                        <div class="flex-shrink-0">
                                            <span class="text-yellow-400 text-xl">⚠️</span>
                                        </div>
                                        <div class="ml-3">
                                            <h3 class="text-sm font-bold text-yellow-800">Verificación de Edad Obligatoria</h3>
                                            <p class="text-sm text-yellow-700 mt-1">
                                                Debido a la industria registrada (${this.settings.archetype}), la verificación de 18+ está bloqueada y no puede ser desactivada por ley.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}

                            <!-- Password Change Section -->
                            <div class="pt-6 mt-6 border-t border-gray-200">
                                <h3 class="text-lg font-bold text-gray-900 mb-4">Cambiar Contraseña de Administrador</h3>
                                <div class="space-y-4">
                                    <input type="password" placeholder="Contraseña actual" .value=${this.passwordCurrent || ''} @input=${e => this.passwordCurrent = e.target.value} class="w-full border-gray-300 rounded-lg p-3 border">
                                    <input type="password" placeholder="Nueva contraseña (mín. 8 caracteres)" .value=${this.passwordNew || ''} @input=${e => this.passwordNew = e.target.value} class="w-full border-gray-300 rounded-lg p-3 border">
                                    <input type="password" placeholder="Confirmar nueva contraseña" .value=${this.passwordConfirm || ''} @input=${e => this.passwordConfirm = e.target.value} class="w-full border-gray-300 rounded-lg p-3 border">
                                    <button @click=${this.changeAdminPassword} class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700">Cambiar Contraseña</button>
                                </div>
                            </div>

                            <div class="pt-6 mt-6 border-t border-gray-100 flex justify-end">
                                <button @click=${this.saveSettings} class="bg-gray-900 text-white px-6 py-3 rounded-lg font-bold hover:bg-black transition-colors shadow">
                                    Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        customElements.define('tenant-dashboard', TenantDashboard);
    </script>
</head>
<body class="m-0 p-0">
    <tenant-dashboard></tenant-dashboard>
</body>
</html>
