{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡A VENDER! Master Control Plane</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Compiled) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#090d14',
                            panel: '#111827',
                            pink: '#f43f5e',
                            blue: '#38bdf8',
                            cyan: '#22d3ee',
                        }
                    },
                    backgroundImage: {
                        'gradient-brand': 'linear-gradient(to right, #f43f5e, #38bdf8)',
                    }
                }
            }
        }
    </script>
    <link href="{% static 'tenants/css/output.css' %}" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090d14;
            color: #f8fafc;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        
        .glass-panel {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }
        
        .text-gradient {
            background: linear-gradient(to right, #f43f5e, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1);
        }
        
        .btn-gradient {
            background: linear-gradient(to right, #f43f5e, #38bdf8);
            color: white;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .btn-gradient:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
    
    <script type="module" src="{% static 'tenants/js/dashboard.js' %}"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script>
        window.addEventListener('error', (event) => {
            const fallback = document.getElementById('dashboard-fallback-error');
            if (fallback) {
                fallback.classList.remove('hidden');
                fallback.querySelector('[data-error-message]').textContent = event.message || 'No se pudo cargar el panel.';
            }
        });
    </script>
</head>
<body>
    <saas-control-plane></saas-control-plane>
    <div id="dashboard-fallback-error" class="hidden min-h-screen p-8 text-white">
        <div class="max-w-xl rounded-lg border border-red-500/30 bg-red-950/40 p-6">
            <h1 class="text-xl font-bold">No se pudo cargar el panel SysAdmin</h1>
            <p class="mt-3 text-sm text-red-100" data-error-message>Revise la consola del navegador o recargue la pagina.</p>
            <a class="mt-5 inline-block rounded bg-white px-4 py-2 text-sm font-bold text-slate-950" href="/admin/">Abrir Django Admin</a>
        </div>
    </div>
</body>
</html>
