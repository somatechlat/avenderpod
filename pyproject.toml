[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = ["--import-mode=importlib"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["E402"]
"helpers/api.py" = ["E402"]
"helpers/faiss_monkey_patch.py" = ["E402"]
"helpers/files.py" = ["E402"]
"helpers/print_style.py" = ["E402"]
"helpers/subagents.py" = ["E402"]
"helpers/task_scheduler.py" = ["E402"]
"plugins/_chat_compaction/helpers/compactor.py" = ["E402"]
