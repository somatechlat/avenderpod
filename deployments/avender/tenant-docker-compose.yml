# ============================================================================
# ¡A VENDER! — Single-Tenant Docker Compose (for Vultr VM deployment)
# ============================================================================
# This file is copied to each tenant Vultr VM and run via cloud-init.
# It runs ONE independent Agent Zero container with no shared volumes.
# All data is persisted in a per-tenant Docker named volume.
#
# Image: agent0ai/agent-zero-tenant (minimal, no SearXNG/SSH/supervisord)
# ============================================================================

services:
  agent_zero:
    image: ${A0_IMAGE:-agent0ai/agent-zero-tenant:latest}
    restart: unless-stopped
    container_name: agent-zero-${TENANT_ID}
    deploy:
      resources:
        limits:
          cpus: '${A0_CPU_LIMIT:-2.0}'
          memory: ${A0_MEMORY_LIMIT:-3G}
        reservations:
          cpus: '${A0_CPU_RESERVATION:-1.0}'
          memory: ${A0_MEMORY_RESERVATION:-1G}
    ports:
      - "${ASSIGNED_PORT}:80"
    volumes:
      # Per-tenant named volume — completely isolated from other tenants
      - "a0_${TENANT_ID}:/a0/usr/workdir"
      - "${TENANT_SECRETS_DIR:-/etc/avender/secrets}:/run/secrets:ro"
    environment:
      TENANT_ID: ${TENANT_ID}
      AVENDER_SETUP_TOKEN_FILE: /run/secrets/AVENDER_SETUP_TOKEN
      SYSADMIN_API_URL: ${SYSADMIN_API_URL}
      SYSADMIN_API_KEY_FILE: /run/secrets/SYSADMIN_API_KEY
      MCP_SERVER_TOKEN_FILE: /run/secrets/MCP_SERVER_TOKEN
      STT_MODEL_SIZE: base
      STT_LANGUAGE: es
      WEB_UI_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Security hardening
    security_opt:
      - no-new-privileges:true
    pids_limit: 1000

# No networks defined — uses default bridge. Tenant has no access to other
# tenant containers by design.
