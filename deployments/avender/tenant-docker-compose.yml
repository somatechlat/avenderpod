# ============================================================================
# ¡A VENDER! — Single-Tenant Docker Compose (for Vultr VM deployment)
# ============================================================================
# This file is copied to each tenant Vultr VM and run via cloud-init.
# It runs ONE independent AvenderPod container with no shared volumes.
# All data is persisted in a per-tenant Docker named volume.
#
# Image: avenderpod:latest (minimal, no SearXNG/SSH/supervisord)
# ============================================================================

services:
  avenderpod:
    image: ${A0_IMAGE:-avenderpod:latest}
    restart: unless-stopped
    container_name: avenderpod-${TENANT_ID}
    deploy:
      resources:
        limits:
          cpus: '${A0_CPU_LIMIT:-2.0}'
          memory: ${A0_MEMORY_LIMIT:-3G}
        reservations:
          cpus: '${A0_CPU_RESERVATION:-1.0}'
          memory: ${A0_MEMORY_RESERVATION:-1G}
    ports:
      - "${ASSIGNED_PORT}:80"
    volumes:
      # Per-tenant named volume — completely isolated from other tenants
      - "avenderpod_data:/a0/usr/workdir"
      - "tenant_vault_token:/run/secrets:ro"
    environment:
      TENANT_ID: ${TENANT_ID}
      SYSADMIN_API_URL: ${SYSADMIN_API_URL}
      TENANT_VAULT_ADDR: ${TENANT_VAULT_ADDR}
      TENANT_VAULT_KV_MOUNT: ${TENANT_VAULT_KV_MOUNT}
      TENANT_VAULT_SECRET_PATH: ${TENANT_VAULT_SECRET_PATH}
      TENANT_VAULT_TOKEN_FILE: /run/secrets/tenant_vault_token
      STT_MODEL_SIZE: base
      STT_LANGUAGE: es
      WEB_UI_HOST: 0.0.0.0
      # All rating limits injected dynamically
      A0_PLAN_ID: ${A0_PLAN_ID}
      A0_PLAN_NAME: ${A0_PLAN_NAME}
      A0_MAX_CONVERSATIONS_PER_MONTH: ${A0_MAX_CONVERSATIONS_PER_MONTH}
      A0_MAX_MESSAGES_PER_DAY: ${A0_MAX_MESSAGES_PER_DAY}
      A0_MAX_MESSAGES_PER_MINUTE: ${A0_MAX_MESSAGES_PER_MINUTE}
      A0_MAX_WHATSAPP_NUMBERS: ${A0_MAX_WHATSAPP_NUMBERS}
      A0_MAX_CATALOG_ITEMS: ${A0_MAX_CATALOG_ITEMS}
      A0_MAX_TRANSCRIPTION_MINUTES_PER_MONTH: ${A0_MAX_TRANSCRIPTION_MINUTES_PER_MONTH}
      A0_MAX_STORAGE_MB: ${A0_MAX_STORAGE_MB}
      A0_MAX_USERS: ${A0_MAX_USERS}
      A0_MAX_AGENT_CONTEXTS: ${A0_MAX_AGENT_CONTEXTS}
      A0_ALLOW_CATALOG_UPLOAD: ${A0_ALLOW_CATALOG_UPLOAD}
      A0_ALLOW_VOICE_MESSAGES: ${A0_ALLOW_VOICE_MESSAGES}
      A0_ALLOW_HUMAN_HANDOFF: ${A0_ALLOW_HUMAN_HANDOFF}
      A0_ALLOW_CREATOR_OVERRIDE: ${A0_ALLOW_CREATOR_OVERRIDE}
      A0_ALLOW_CUSTOM_DOMAIN: ${A0_ALLOW_CUSTOM_DOMAIN}
      A0_ALLOW_INTEGRATIONS: ${A0_ALLOW_INTEGRATIONS}
      A0_ALLOW_MOBILE_APP: ${A0_ALLOW_MOBILE_APP}
      A0_ALLOW_MULTICHANNEL: ${A0_ALLOW_MULTICHANNEL}
      A0_ALLOW_OUTBOUND_REACTIVATION: ${A0_ALLOW_OUTBOUND_REACTIVATION}
      A0_ALLOW_CALL_HANDLING: ${A0_ALLOW_CALL_HANDLING}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Security hardening
    security_opt:
      - no-new-privileges:true

# No networks defined — uses default bridge. Tenant has no access to other
# tenant containers by design.

volumes:
  avenderpod_data:
    name: avenderpod_${TENANT_ID}
  tenant_vault_token:
    name: tenant_vault_token_${TENANT_ID}
