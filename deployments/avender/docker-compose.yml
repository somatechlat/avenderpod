# ============================================================================
# ¡A VENDER! — Production Docker Compose Orchestration (v3.0)
# ============================================================================
# Port Range: 45000–45002 (isolated from host dev services)
# Stack: 3 services — sysadmin (Django Control Plane) + whisper + agent_zero
# Startup Order: sysadmin → whisper → agent_zero
# RAM Budget: ~5GB total
# All services have: health checks, memory limits, restart policies, log rotation
# ============================================================================

services:

  # ==========================================================================
  # TIER 0 — SYSTEM ADMIN CONTROL PLANE (Django + Ninja)
  # Manages tenant lifecycle, billing, Vultr provisioning, and platform health.
  # Protected by Django's built-in auth — requires superuser login.
  # ==========================================================================

  sysadmin:
    build:
      context: ../..
      dockerfile: deployments/avender/Dockerfile.sysadmin
    restart: unless-stopped
    container_name: avender_sysadmin
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "45000:8000"
    volumes:
      - sysadmin_db:/app/db
      - ../../admin:/app
      - ./sysadmin_entrypoint.sh:/app/entrypoint.sh
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-avender2026}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@avender.local}
      VULTR_API_KEY: ${VULTR_API_KEY:-}
      VULTR_REGION: ${VULTR_REGION:-mia}
      VULTR_PLAN: ${VULTR_PLAN:-vc2-1c-1gb}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/admin/login/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network



  # ==========================================================================
  # TIER 1.5 — CENTRALIZED TRANSCRIPTION ENGINE (Whisper)
  # CPU-only, handles OGG voice notes from WhatsApp customers
  # ==========================================================================

  whisper_server:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    container_name: avender_whisper
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "45002:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-base
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 2 — COGNITIVE ENGINE (Agent Zero + Avender Plugin + Baileys WA Bridge)
  # ==========================================================================
  # LLM API key: configured via Agent Zero's built-in settings UI.
  # WhatsApp: uses native _whatsapp_integration plugin (Baileys bridge, port 3100 internal).
  # Admin portals served at /plugins/avender/tenant_admin and /plugins/avender/system_admin
  # ==========================================================================

  agent_zero:
    build:
      context: ../..
      dockerfile: DockerfileLocal
    restart: unless-stopped
    container_name: avender_agent_zero
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
    depends_on:
      whisper_server:
        condition: service_healthy
    ports:
      - "45001:80"
    volumes:
      - ../../usr:/a0/usr
      - a0_workdir:/a0/usr/workdir
    environment:
      # Avender setup token — prevents unauthorized onboarding calls
      AVENDER_SETUP_TOKEN: ${AVENDER_SETUP_TOKEN:-change_me_before_production}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

networks:
  avender_network:
    driver: bridge
    name: avender_network

volumes:
  a0_workdir:
    name: avender_a0_workdir
  sysadmin_db:
    name: avender_sysadmin_db
