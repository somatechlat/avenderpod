# ============================================================================
# ¡A VENDER! — Production Docker Compose Orchestration (v3.0)
# ============================================================================
# Port Range: 45000–45002 (isolated from host dev services)
# Stack: 4 services — sysadmin, db (postgres), whisper, agent_zero
# Startup Order: db → sysadmin → whisper → agent_zero
# RAM Budget: ~5GB total
# ============================================================================

services:

  # ==========================================================================
  # TIER 0 — POSTGRESQL DATABASE
  # 100% secure, production-grade storage for SysAdmin Control Plane
  # ==========================================================================
  avender_postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: avender_postgres
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avender_db}
      POSTGRES_USER: ${POSTGRES_USER:-avender_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avender_pass}
    volumes:
      - avender_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avender_user} -d ${POSTGRES_DB:-avender_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avender_network

  # ==========================================================================
  # TIER 1 — SYSTEM ADMIN CONTROL PLANE (Django + Ninja)
  # ==========================================================================
  sysadmin:
    build:
      context: ../..
      dockerfile: deployments/avender/Dockerfile.sysadmin
    restart: unless-stopped
    container_name: avender_sysadmin
    depends_on:
      avender_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "45000:8000"
    volumes:
      - ../../admin:/app
      - ./sysadmin_entrypoint.sh:/app/entrypoint.sh
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avender_db}
      POSTGRES_USER: ${POSTGRES_USER:-avender_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avender_pass}
      POSTGRES_HOST: avender_postgres
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-avender2026}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@avender.local}
      SYSADMIN_API_KEY: ${SYSADMIN_API_KEY:-}
      VULTR_API_KEY: ${VULTR_API_KEY:-}
      VULTR_REGION: ${VULTR_REGION:-mia}
      VULTR_PLAN: ${VULTR_PLAN:-vc2-1c-1gb}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_TIMEOUT_SECONDS: ${VAULT_TIMEOUT_SECONDS:-10}
      SYSADMIN_API_PUBLIC_URL: ${SYSADMIN_API_PUBLIC_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/admin/login/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 1.5 — CENTRALIZED TRANSCRIPTION ENGINE (Whisper)
  # ==========================================================================
  whisper_server:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    container_name: avender_whisper
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "45002:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-base
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 2 — COGNITIVE ENGINE (Agent Zero + Avender Plugin + Baileys WA Bridge)
  # ==========================================================================
  agent_zero:
    build:
      context: ../..
      dockerfile: DockerfileLocal
    restart: unless-stopped
    container_name: avender_agent_zero
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
    depends_on:
      whisper_server:
        condition: service_healthy
    ports:
      - "45001:80"
    volumes:
      - ../../usr:/a0/usr
      - a0_workdir:/a0/usr/workdir
    environment:
      AVENDER_SETUP_TOKEN: ${AVENDER_SETUP_TOKEN:-change_me_before_production}
      WEB_UI_HOST: 0.0.0.0
      WHISPER_API_URL: http://avender_whisper:8000/v1/audio/transcriptions
      TENANT_ID: "2e121b7e-94ea-4511-abfc-ac8a36adcb8b"
      SYSADMIN_API_URL: http://avender_sysadmin:8000/api/saas
      SYSADMIN_API_KEY: ${SYSADMIN_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

networks:
  avender_network:
    driver: bridge
    name: avender_network

volumes:
  a0_workdir:
    name: avender_a0_workdir
  avender_pg_data:
    name: avender_pg_data
