# ============================================================================
# ¡A VENDER! — Production Docker Compose Orchestration
# ============================================================================
# Port Range: 45001–45003 (isolated from host dev services)
# Startup Order: postgres → redis → chatwoot_migrate → chatwoot_web/worker → whisper → agent_zero
# All services have: health checks, memory limits, restart policies, logging limits
# ============================================================================

x-chatwoot-env: &chatwoot-env
  SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
  FRONTEND_URL: http://localhost:45003
  POSTGRES_DATABASE: chatwoot
  POSTGRES_HOST: postgres
  POSTGRES_USERNAME: postgres
  POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-avender_secret}
  REDIS_URL: redis://:${CHATWOOT_REDIS_PASSWORD:-avender_secret}@redis:6379/

services:

  # ==========================================================================
  # TIER 1 — DATA LAYER: PostgreSQL (pgvector) + Redis
  # ==========================================================================

  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    container_name: avender_cw_db
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-avender_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: avender_cw_redis
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    command:
      - sh
      - -c
      - redis-server --requirepass "${CHATWOOT_REDIS_PASSWORD:-avender_secret}" --maxmemory 200mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CHATWOOT_REDIS_PASSWORD:-avender_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 1 — CHATWOOT: Migration (one-shot) → Web → Worker
  # ==========================================================================

  chatwoot_migrate:
    image: chatwoot/chatwoot:latest
    container_name: avender_cw_migrate
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *chatwoot-env
    command: ['bundle', 'exec', 'rails', 'db:chatwoot_prepare']
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  chatwoot_web:
    image: chatwoot/chatwoot:latest
    container_name: avender_cw_web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      chatwoot_migrate:
        condition: service_completed_successfully
    ports:
      - "45003:3000"
    environment:
      <<: *chatwoot-env
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; r=Net::HTTP.get_response(URI('http://localhost:3000/auth/sign_in')); exit(r.code.to_i < 500 ? 0 : 1)\""]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

  chatwoot_worker:
    image: chatwoot/chatwoot:latest
    container_name: avender_cw_worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      chatwoot_migrate:
        condition: service_completed_successfully
    environment:
      <<: *chatwoot-env
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 1.5 — CENTRALIZED TRANSCRIPTION ENGINE (Whisper)
  # ==========================================================================

  whisper_server:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    container_name: avender_whisper
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
      - "45002:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-base
      WHISPER__INFERENCE_DEVICE: cpu
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 2 — COGNITIVE ENGINE (Agent Zero + Avender Plugin)
  # ==========================================================================
  # LLM API key is configured via Agent Zero's built-in settings UI,
  # NOT injected via environment variables.
  # ==========================================================================

  agent_zero:
    build:
      context: ../..
      dockerfile: DockerfileLocal
    restart: unless-stopped
    container_name: avender_agent_zero
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    depends_on:
      whisper_server:
        condition: service_healthy
      chatwoot_web:
        condition: service_healthy
    ports:
      - "45001:80"
    volumes:
      - ../../usr:/a0/usr
      - a0_workdir:/a0/usr/workdir
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

networks:
  avender_network:
    driver: bridge
    name: avender_network

volumes:
  postgres_data:
    name: avender_postgres_data
  redis_data:
    name: avender_redis_data
  a0_workdir:
    name: avender_a0_workdir
