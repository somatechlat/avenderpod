# ============================================================================
# ¡A VENDER! — Production Docker Compose Orchestration (v3.1)
# ============================================================================
# Port Range: 45000–45001 (isolated from host dev services)
# Stack: sysadmin, db (postgres), vault, agent_zero
# Startup Order: vault → db → sysadmin → agent_zero
# RAM Budget: ~5GB total including tenant-local Whisper
# ============================================================================

services:

  # ==========================================================================
  # TIER 0 — HASHICORP VAULT (LOCAL SECRET STORE)
  # ==========================================================================
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    container_name: avender_vault
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.local.hcl
    volumes:
      - vault_data:/vault/file
      - ./vault.local.hcl:/vault/config/vault.local.hcl:ro
    expose:
      - "8200"
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1 || [ $$? -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - avender_network

  vault_bootstrap:
    image: python:3.12-alpine
    container_name: avender_vault_bootstrap
    depends_on:
      vault:
        condition: service_started
    working_dir: /bootstrap
    volumes:
      - ./vault_bootstrap.py:/bootstrap/vault_bootstrap.py:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}:/avender/secrets
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      AVENDER_SECRETS_DIR: /avender/secrets
      VAULT_BOOTSTRAP_DIR: /avender/secrets/vault
    command: python /bootstrap/vault_bootstrap.py
    restart: "no"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 0 — POSTGRESQL DATABASE
  # 100% secure, production-grade storage for SysAdmin Control Plane
  # ==========================================================================
  avender_postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: avender_postgres
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avender_db}
      POSTGRES_USER: ${POSTGRES_USER:-avender_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - avender_pg_data:/var/lib/postgresql/data
      - ${AVENDER_SECRETS_DIR:-./secrets}/postgres_password:/run/secrets/postgres_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avender_user} -d ${POSTGRES_DB:-avender_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avender_network

  # ==========================================================================
  # TIER 1 — SYSTEM ADMIN CONTROL PLANE (Django + Ninja)
  # ==========================================================================
  sysadmin:
    build:
      context: ../..
      dockerfile: deployments/avender/Dockerfile.sysadmin
    restart: unless-stopped
    container_name: avender_sysadmin
    depends_on:
      avender_postgres:
        condition: service_healthy
      vault_bootstrap:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      # Local browser access only. Service-to-service calls use avender_network.
      - "127.0.0.1:45000:8000"
    volumes:
      # Secret files — bind-mounted read-only from Vault-materialized directory
      - ${AVENDER_SECRETS_DIR:-./secrets}/postgres_password:/run/secrets/postgres_password:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/django_secret_key:/run/secrets/django_secret_key:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/django_superuser_password:/run/secrets/django_superuser_password:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/sysadmin_api_key:/run/secrets/sysadmin_api_key:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/vultr_api_key:/run/secrets/vultr_api_key:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/vault_token:/run/secrets/vault_token:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avender_db}
      POSTGRES_USER: ${POSTGRES_USER:-avender_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_HOST: avender_postgres
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD_FILE: /run/secrets/django_superuser_password
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@avender.local}
      SYSADMIN_API_KEY_FILE: /run/secrets/sysadmin_api_key
      VULTR_API_KEY_FILE: /run/secrets/vultr_api_key
      VULTR_REGION: ${VULTR_REGION:-mia}
      # IMPORTANT: must be ≥ vc2-2c-4gb to fit the 3GB RAM / 2 CPU container limit
      VULTR_PLAN: ${VULTR_PLAN:-vc2-2c-4gb}
      VULTR_OS_ID: ${VULTR_OS_ID:-2136}
      VULTR_VPC_ID: ${VULTR_VPC_ID:-}
      VULTR_FIREWALL_GROUP_ID: ${VULTR_FIREWALL_GROUP_ID:-}
      CLUSTER_VPC_IP: ${CLUSTER_VPC_IP:-}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN_FILE: /run/secrets/vault_token
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_TIMEOUT_SECONDS: ${VAULT_TIMEOUT_SECONDS:-10}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/admin/login/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - avender_network

  # ==========================================================================
  # TIER 2 — COGNITIVE ENGINE (Agent Zero + Avender Plugin + Baileys WA Bridge)
  # ==========================================================================
  # NOTE: This is the SINGLE-TENANT development instance.
  # In production, each tenant gets their own VM running this container.
  # See: deployments/avender/tenant-docker-compose.yml
  # ==========================================================================
  agent_zero:
    build:
      context: ../..
      dockerfile: DockerfileLocal
    restart: unless-stopped
    container_name: avender_agent_zero
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
    # NOTE: This is a DEV-ONLY instance. In production each tenant gets their
    # own Vultr VM. No public port binding — access via VPC or localhost tunnel.
    # ports:
    #   - "45001:80"
    volumes:
      # Per-tenant named volume for agent workspace
      - a0_workdir:/a0/usr/workdir
      # Secret files
      - ${AVENDER_SECRETS_DIR:-./secrets}/avender_setup_token:/run/secrets/avender_setup_token:ro
      - ${AVENDER_SECRETS_DIR:-./secrets}/sysadmin_api_key:/run/secrets/sysadmin_api_key:ro
    environment:
      AVENDER_SETUP_TOKEN_FILE: /run/secrets/avender_setup_token
      WEB_UI_HOST: 0.0.0.0
      STT_MODEL_SIZE: base
      STT_LANGUAGE: es
      TENANT_ID: ${DEV_TENANT_ID:-00000000-0000-0000-0000-000000000000}
      SYSADMIN_API_URL: http://avender_sysadmin:8000/api/saas
      SYSADMIN_API_KEY_FILE: /run/secrets/sysadmin_api_key
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[r]un_ui.py' && ps aux | grep -q '[b]ridge.js' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - avender_network

networks:
  avender_network:
    driver: bridge
    name: avender_network

volumes:
  vault_data:
    name: avender_vault_data
  a0_workdir:
    name: avender_a0_workdir
  avender_pg_data:
    name: avender_pg_data
