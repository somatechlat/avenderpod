# Whisper Proxy — Authenticated reverse proxy for faster-whisper-server
# Exposes the transcription endpoint to tenant VMs with API key validation.
# Do NOT expose the upstream Whisper directly to the internet.

upstream whisper_backend {
    server avender_whisper:8000;
    keepalive 32;
}

# Rate limit zone: 100 req/min per API key
limit_req_zone $http_x_api_key zone=whisper_limit:10m rate=100r/m;

server {
    listen 8000;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Client body size: max 50MB audio files
    client_max_body_size 50M;
    client_body_timeout 120s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Health check endpoint (no auth required)
    location /health {
        access_log off;
        proxy_pass http://whisper_backend/health;
        proxy_http_version 1.1;
    }

    # Docs endpoint (no auth required, read-only)
    location /docs {
        proxy_pass http://whisper_backend/docs;
        proxy_http_version 1.1;
    }

    # OpenAPI schema (no auth required, read-only)
    location /openapi.json {
        proxy_pass http://whisper_backend/openapi.json;
        proxy_http_version 1.1;
    }

    # Main transcription endpoint — requires API key
    location /v1/audio/transcriptions {
        # Reject requests without X-API-Key header
        if ($http_x_api_key = "") {
            return 401 '{"error":"Missing X-API-Key header"}';
        }

        # Validate API key against htpasswd file
        auth_basic "Whisper API";
        auth_basic_user_file /etc/nginx/whisper.htpasswd;

        # Rate limiting per key
        limit_req zone=whisper_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://whisper_backend/v1/audio/transcriptions;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-Key $http_x_api_key;

        # Hide upstream server info
        proxy_hide_header Server;
    }

    # Catch-all: deny anything else
    location / {
        return 404 '{"error":"Not found"}';
    }
}
