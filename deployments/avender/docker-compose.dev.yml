# ============================================================================
# ¡A VENDER! — Development Overrides
# ============================================================================
# Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================================

services:
  sysadmin:
    volumes:
      # Bind-mount source for hot-reload during development.
      # NEVER use this in production — use the built image instead.
      - ../../admin:/app
      - ./sysadmin_entrypoint.sh:/app/entrypoint.sh
    environment:
      DJANGO_DEBUG: "true"

  agent_zero:
    volumes:
      # Dev-only source mount for plugin development
      - ../../usr:/a0/usr
      # Runtime patches for upstream third-party bugs
      - ./a0_runtime_patches.sh:/a0/a0_runtime_patches.sh:ro
    entrypoint: ["/bin/bash", "-c", "bash /a0/a0_runtime_patches.sh && exec /entrypoint.sh"]
